<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTACK HUB | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #030303; color: #ffffff; margin: 0; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #0d2a17 0%, #030303 70%); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; transition: 0.4s; }
        .glass-card:hover { border-color: #22c55e; transform: scale(1.02); }
        .btn-action { background: #22c55e; color: #000; font-weight: 800; transition: 0.3s; }
        .btn-action:hover { background: #ffffff; box-shadow: 0 0 30px #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="bg-gradient"></div>
    <nav class="w-full py-6 px-10 flex justify-between items-center border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-extrabold italic tracking-tighter uppercase">ATTACK <span class="text-green-500">HUB</span></div>
        <button onclick="toggleModal('contactModal')" class="text-[11px] font-bold uppercase tracking-widest border-b border-green-500 pb-1">ติดต่อสอบถาม</button>
    </nav>
    <main class="flex-grow flex items-center justify-center px-6 py-10">
        <div class="glass-card max-w-[420px] w-full p-8 relative overflow-hidden">
            <div class="relative group rounded-3xl overflow-hidden mb-8 border border-white/10 shadow-2xl">
                <img src="https://i.ibb.co/HT78Jvzp/20260507-121022.png" class="w-full h-72 object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#030303] via-transparent to-transparent"></div>
            </div>
            <div class="space-y-4">
                <h2 class="text-3xl font-black italic uppercase">ALL MAP SCRIPT</h2>
                <div class="space-y-2 text-[13px] font-light text-gray-300">
                    <p>✅ รองรับ: <span class="text-white font-medium">Anime Apocalypse, MM2</span></p>
                    <p>✅ ฟังก์ชัน: <span class="text-white font-medium">Auto Farm, ESP, Teleport</span></p>
                    <p class="text-red-500 font-bold">⚠️ ไม่รองรับตัวรัน Xeno (รันไม่ติด = ไม่รองรับ)</p>
                </div>
                <button onclick="toggleModal('buyModal')" class="btn-action w-full py-5 rounded-2xl text-[12px] uppercase mt-4">รับสคริปต์ใช้งาน</button>
            </div>
        </div>
    </main>
    <div id="contactModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="glass-card max-w-xs w-full p-10 text-center">
            <h3 class="text-xl font-bold uppercase mb-8 italic">Support</h3>
            <a href="https://discord.gg/Um6zu72WTa" target="_blank" class="block w-full bg-[#5865f2] py-4 rounded-2xl text-xs font-extrabold uppercase mb-4">Discord</a>
            <button onclick="toggleModal('contactModal')" class="text-[10px] text-gray-500 uppercase font-bold">ปิดหน้าต่าง</button>
        </div>
    </div>
    <div id="buyModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="glass-card max-w-xs w-full p-10 text-center border-t-2 border-green-500">
            <h3 class="text-xl font-bold uppercase mb-2 italic text-green-500">Success</h3>
            <a href="https://discord.gg/Um6zu72WTa" target="_blank" class="block w-full btn-action py-4 rounded-2xl text-xs font-extrabold uppercase mb-4">เข้ากลุ่ม Discord</a>
            <button onclick="toggleModal('buyModal')" class="text-[10px] text-gray-500 uppercase font-bold">ยกเลิก</button>
        </div>
    </div>
    <script>
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }
    </script>
</body>
</html>
